name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can — it helps us reproduce and fix it faster.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong? One clear sentence.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or sequence of calls that triggers the bug.
      placeholder: |
        ```typescript
        const client = new GenesisMeshClient({ ... });
        await client.evidence.build({ ... });
        // throws / returns unexpected value
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include the full error message and stack trace.
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "0.53.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v22.3.0"
    validations:
      required: true

  - type: input
    id: na-version
    attributes:
      label: NA version (if known)
      placeholder: "0.53.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — OS, import mode (ESM/CJS), NA error response body.
    validations:
      required: false
